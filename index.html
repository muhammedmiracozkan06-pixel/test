<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wmail SSO - Test Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0f17;
            --card-bg: #141923;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #8a8a93;
            --btn-blue: #0067b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .test-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .sso-btn {
            background: var(--btn-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            border-bottom: 2px solid rgba(0,0,0,0.2);
        }

        .sso-btn:hover {
            background: #0078d4;
        }

        .success-box {
            border: 1px dashed rgba(0, 255, 204, 0.3);
            background: rgba(0, 255, 204, 0.03);
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }

        .user-name {
            color: var(--accent-color);
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .user-email {
            font-family: monospace;
            color: #ccc;
            font-size: 13px;
        }

        .token-info {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 15px;
            word-break: break-all;
            background: rgba(0,0,0,0.2);
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="test-container">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-network-wired" style="color: var(--accent-color); font-size: 40px;"></i>
        </div>
        
        <h1>Remote Client App</h1>
        <p>Wmail SSO entegrasyonunu ve API anahtarını doğrulamak için aşağıdaki butonu kullanın.</p>

        <button id="wmail-sso-trigger" class="sso-btn">
            <i class="fas fa-shield-alt"></i> Wmail Identity ile Bağlan
        </button>

        <div id="success-panel" class="success-box">
            <i class="far fa-check-circle" style="color: var(--accent-color); font-size: 30px;"></i>
            <div style="margin-top: 10px; font-size: 12px; color: var(--text-muted);">Giriş Başarılı!</div>
            <div id="display-name" class="user-name">-</div>
            <div id="display-email" class="user-email">-</div>
            <div id="display-token" class="token-info">Token: -</div>
            
            <button onclick="logout()" style="margin-top: 20px; background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 6px 12px; cursor: pointer; font-size: 12px;">
                Oturumu Kapat
            </button>
        </div>
    </div>

    <script>
        // Senin aldığın aktif API anahtarı
        const MY_API_KEY = "WMAIL-KEY-VUHLUF7WS-88538";

        // 1. ADIM: Wmail SSO Giriş Rutinini Başlatma
        document.getElementById("wmail-sso-trigger").addEventListener("click", () => {
            // Kullanıcı giriş yaptıktan sonra bu test sayfasına geri dönecek
            const currentRedirectUrl = window.location.origin + window.location.pathname;
            
            const encodedRedirect = encodeURIComponent(currentRedirectUrl);
            const encodedApiKey = encodeURIComponent(MY_API_KEY);
            
            // Kullanıcıyı Wmail Gateway sayfana yönlendiriyoruz
            window.location.href = `https://authwmail.vercel.app?redirect=${encodedRedirect}&apikey=${encodedApiKey}`;
        });

        // 2. ADIM: URL Parametrelerini Dinleme ve İsmi Ekrana Yazdırma
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const username = urlParams.get('username');
            const email = urlParams.get('email');
            const token = urlParams.get('token');

            // Eğer Wmail yönlendirmesinden gelen başarı parametreleri varsa
            if (status === 'success' && username) {
                // Giriş butonunu gizle, başarı panelini göster
                document.getElementById("wmail-sso-trigger").style.display = "none";
                document.getElementById("success-panel").style.display = "block";

                // URL'den gelen verileri çözüp ekrana bas
                document.getElementById("display-name").innerText = decodeURIComponent(username);
                document.getElementById("display-email").innerText = decodeURIComponent(email);
                document.getElementById("display-token").innerText = "Authorized Token: " + decodeURIComponent(token);
                
                // URL'deki parametreleri temizle (Hoş bir görüntü için)
                window.history.pushState({}, '', window.location.origin + window.location.pathname);
            }
        });

        // Test amaçlı local çıkış fonksiyonu
        function logout() {
            window.location.href = window.location.origin + window.location.pathname;
        }
    </script>
</body>
</html>
