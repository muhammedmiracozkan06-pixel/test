<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wmail SSO - Giriş Testi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0d12;
            --card-bg: #14161f;
            --primary-neon: #00ffcc;
            --microsoft-blue: #0067b8;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .test-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            box-sizing: border-box;
        }

        /* Giriş Öncesi Arayüz Elementleri */
        .gateway-icon {
            font-size: 50px;
            color: var(--primary-neon);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        .btn-sso {
            background: var(--microsoft-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-sso:hover {
            background: #005a9e;
            box-shadow: 0 0 15px rgba(0, 103, 184, 0.4);
        }

        /* Giriş Sonrası Arayüz Elementleri */
        .welcome-screen {
            display: none; /* Başlangıçta gizli */
        }

        .user-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid var(--primary-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: var(--primary-neon);
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .welcome-title {
            font-size: 26px;
            color: var(--primary-neon);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .user-email {
            font-family: monospace;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #ff4d4d;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255, 77, 77, 0.1);
            border-color: #ff4d4d;
        }
    </style>
</head>
<body>

    <div class="test-container">
        
        <div id="login-screen">
            <div class="gateway-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Uygulamaya Giriş Yap</h1>
            <p>Devam etmek için güvenli Wmail Central Identity Gateway altyapısını kullanarak oturum açın.</p>
            
            <button id="wmail-sso-trigger" class="btn-sso">
                <i class="fas fa-sign-in-alt"></i> Wmail ile Oturum Aç
            </button>
        </div>

        <div id="welcome-screen" class="welcome-screen">
            <div class="user-avatar">
                <i class="far fa-user"></i>
            </div>
            <div id="user-display-name" class="welcome-title">Hoş geldin!</div>
            <div id="user-display-email" class="user-email">E-posta Yükleniyor...</div>
            
            <button id="logout-trigger" class="btn-logout">
                <i class="fas fa-power-off"></i> Oturumu Kapat
            </button>
        </div>

    </div>

    <script>
        // 🛠️ CONFIG: Gateway adresin ve senin ürettiğin aktif API anahtarın
        const WMAIL_GATEWAY_URL = "https://authwmail.vercel.app";
        const MY_API_KEY = "WMAIL-KEY-8E65XZ6TE-32975";

        // Butona tıklandığında gateway'e yönlendirme tetiklemesi
        document.getElementById("wmail-sso-trigger").addEventListener("click", () => {
            const currentUrl = window.location.origin + window.location.pathname;
            
            const encodedRedirect = encodeURIComponent(currentUrl);
            const encodedApiKey = encodeURIComponent(MY_API_KEY);
            
            // Kullanıcıyı elindeki key ile birlikte giriş paneline şutla
            window.location.href = `${WMAIL_GATEWAY_URL}?redirect=${encodedRedirect}&apikey=${encodedApiKey}`;
        });

        // Sayfa her açıldığında URL parametrelerini denetle
        window.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const username = urlParams.get('username');
            const email = urlParams.get('email');

            // Eğer ana sayfadan "success" yanıtı ve kullanıcı adı geldiyse
            if (status === 'success' && username) {
                // Giriş yap buton ekranını tamamen gizle
                document.getElementById("login-screen").style.display = "none";
                
                // Karşılama ekranını aktif et
                const welcomeScreen = document.getElementById("welcome-screen");
                welcomeScreen.style.display = "block";
                
                // 🚀 EKRANA İSMİ VE E-POSTAYI YAZDIRAN KISIM BURA
                document.getElementById("user-display-name").innerText = `Hoş geldin, ${decodeURIComponent(username)}!`;
                if (email) {
                    document.getElementById("user-display-email").innerText = decodeURIComponent(email);
                }
            }
        });

        // Oturumu kapatınca URL parametrelerini temizle ve ilk ekrana geri dön
        document.getElementById("logout-trigger").addEventListener("click", () => {
            window.location.href = window.location.origin + window.location.pathname;
        });
    </script>
</body>
</html>
