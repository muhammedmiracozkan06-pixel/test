<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wmail SSO Test Client</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b0c10;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #171d28;
            border: 1px solid #232d3f;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        p {
            color: #8a8a93;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .user-name {
            font-size: 32px;
            font-weight: bold;
            color: #00ffcc;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #0067b8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover {
            background: #005da6;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.1);
        }
    </style>
</head>
<body>

<div class="container" id="app-root">
    <div id="logged-out-view">
        <h1>Wmail Gateway Test</h1>
        <p>Projenizi test etmek için merkezi kimlik servisi ile oturum açın.</p>
        <button class="btn" onclick="loginWithWmail()">Wmail ile Oturum Aç</button>
    </div>

    <div id="logged-in-view" style="display: none;">
        <p>Giriş Başarılı! Hoş geldin</p>
        <div class="user-name" id="display-name">---</div>
        <p id="display-email" style="font-size: 12px; margin-bottom: 15px;"></p>
        <button class="btn logout-btn" onclick="logout()">Oturumu Kapat</button>
    </div>
</div>

<script>
    // 🔑 SENİN ÜRETTİĞİN YENİ LIVE API KEY kanka
    const WMAIL_API_KEY = "WMAIL-KEY-3IAUZ01Z6-12444";
    
    // 🌐 Merkezi Vercel Auth URL'n
    const WMAIL_GATEWAY_URL = "https://authwmail.vercel.app/";

    // 🚀 1. Butona Basınca Vercel'e Fırlatan Fonksiyon
    function loginWithWmail() {
        const currentUrl = window.location.href; // Giriş bittikten sonra geri dönülecek adres
        
        // URL'yi hazırlayıp Vercel'deki o Microsoft temalı sisteme yönlendiriyoruz
        window.location.href = `${WMAIL_GATEWAY_URL}?redirect=${encodeURIComponent(currentUrl)}&apikey=${WMAIL_API_KEY}`;
    }

    // 📥 2. Sayfa Yüklendiğinde URL parametrelerini Yakalama
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Eğer Vercel giriş onayını verip bizi success durumuyla geri gönderdiyse
        if (urlParams.get('status') === 'success') {
            const username = urlParams.get('username');
            const email = urlParams.get('email');
            
            // 🛠️ HATA DÜZELTİLDİ: Tek .style ile görünür yapıyoruz kanka
            document.getElementById('logged-out-view').style.display = 'none';
            document.getElementById('logged-in-view').style.display = 'block';
            
            document.getElementById('display-name').innerText = username;
            document.getElementById('display-email').innerText = email;

            // URL barındaki o kalabalık parametreleri temizle (estetik dursun diye) kanka
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    };

    // 🚪 3. Çıkış Yapma Protokolü
    function logout() {
        window.location.href = window.location.pathname;
    }
</script>
    
</body>
</html>
