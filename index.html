<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wmail API Integration Test Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0d;
            --card-bg: #11141c;
            --primary-neon: #00ffcc;
            --text-muted: #8a8a93;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Test Kartı */
        .test-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 {
            font-size: 1.3rem;
            color: var(--primary-neon);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Profil Alanı Stilleri */
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .avatar-holder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--primary-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .avatar-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-holder i {
            font-size: 40px;
            color: var(--text-muted);
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 5px 0 0 0;
            color: #ffffff;
        }

        .user-email {
            font-family: monospace;
            font-size: 0.95rem;
            color: var(--primary-neon);
            background: rgba(0, 255, 204, 0.05);
            padding: 6px 12px;
            border: 1px dashed rgba(0, 255, 204, 0.2);
            margin: 0;
        }

        /* Butonlar */
        .api-btn {
            width: 100%;
            padding: 12px;
            background: #0067b8;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .api-btn:hover {
            background: #005da6;
        }

        .status-badge {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ff4d4d;
            margin-bottom: 15px;
            display: inline-block;
        }

        .status-success {
            color: var(--primary-neon);
        }
    </style>
</head>
<body>

    <div class="test-card">
        <h1>Wmail Integration Test</h1>
        <p class="subtitle">App Environment Authorization Gateway</p>

        <div id="app-state-area">
            <span id="status-text" class="status-badge">App Disconnected</span>
            <button class="api-btn" id="connect-btn"><i class="fas fa-plug"></i> Connect via Wmail SSO</button>
        </div>

        <div id="profile-area" class="profile-container" style="display: none;">
            <span class="status-badge status-success">Handshake Secured</span>
            
            <div class="avatar-holder">
                <img id="user-avatar" src="https://ui-avatars.com/api/?background=11141c&color=00ffcc&bold=true&name=W" alt="Profile Photo">
            </div>

            <div class="user-name" id="user-display-name">Loading...</div>

            <div class="user-email" id="user-display-email">loading@wmail.com</div>
            
            <button class="api-btn" id="clear-session-btn" style="background: rgba(255,77,77,0.1); border: 1px solid #ff4d4d; color: #ff4d4d; margin-top: 25px;">Clear Session</button>
        </div>
    </div>

    <script>
        // Sizin Canlı Vercel API Key Tanımlaması ve Redirect URL Belirleme
        const WMAIL_API_KEY = "WMAIL-KEY-C4SGBIT77-75653";
        // Canlıda veya lokalde çalışırken redirect parametresini otomatik algılar
        const APP_REDIRECT_URL = window.location.origin + window.location.pathname;

        const connectBtn = document.getElementById('connect-btn');
        const clearSessionBtn = document.getElementById('clear-session-btn');
        const appStateArea = document.getElementById('app-state-area');
        const profileArea = document.getElementById('profile-area');

        // URL'den dönen SSO parametrelerini kontrol etme paneli
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const username = urlParams.get('username');
            const email = urlParams.get('email');

            if (status === 'success' && username && email) {
                // Giriş başarılı veriler geldi! Girdi alanlarını doldur ve göster
                appStateArea.style.display = 'none';
                profileArea.style.display = 'flex';

                document.getElementById('user-display-name').innerText = decodeURIComponent(username);
                document.getElementById('user-display-email').innerText = decodeURIComponent(email);
                
                // İsteğe bağlı: İsme özel dinamik avatar oluşturucu
                document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?background=141821&color=00ffcc&bold=true&size=128&name=${username}`;
            }
        });

        // Wmail SSO Tetikleme Fonksiyonu
        if (connectBtn) {
            connectBtn.addEventListener('click', () => {
                const encodedRedirect = encodeURIComponent(APP_REDIRECT_URL);
                const encodedApiKey = encodeURIComponent(WMAIL_API_KEY);
                
                // Kendi authwmail vercel adresini buraya yazıyorsun kanka:
                const wmailAuthGateway = `https://authwmail.vercel.app/?redirect=${encodedRedirect}&apikey=${encodedApiKey}`;
                
                // Eğer lokalde test ediyorsan geçici olarak alttakini açabilirsin:
                // const wmailAuthGateway = `http://localhost:5000/?redirect=${encodedRedirect}&apikey=${encodedApiKey}`;

                window.location.href = wmailAuthGateway;
            });
        }

        // Test Oturumunu Kapatma
        if (clearSessionBtn) {
            clearSessionBtn.addEventListener('click', () => {
                window.location.href = window.location.origin + window.location.pathname;
            });
        }
    </script>
</body>
</html>
