<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WMail Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        h2 {
            margin-bottom: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<h2 id="userText">Giriş yapılmadı</h2>
<button id="wmail-sso-trigger">WMail ile Giriş Yap</button>

<script>
// ===============================
// 1. LOGIN FUNCTION
// ===============================
function initiateWmailLogin(apiKey, customRedirectUrl) {
    if (!apiKey) {
        console.error("API Key gerekli!");
        return;
    }

    const targetRedirect = customRedirectUrl || (window.location.origin + window.location.pathname);
    const encodedRedirect = encodeURIComponent(targetRedirect);
    const encodedApiKey = encodeURIComponent(apiKey);

    window.location.href = `https://authwmail.vercel.app?redirect=${encodedRedirect}&apikey=${encodedApiKey}`;
}

// ===============================
// 2. BUTTON CLICK
// ===============================
document.getElementById("wmail-sso-trigger").addEventListener("click", () => {
    const MY_API_KEY = "WMAIL-KEY-8E65XZ6TE-32975";
    initiateWmailLogin(MY_API_KEY);
});

// ===============================
// 3. RESPONSE PARSE
// ===============================
const params = new URLSearchParams(window.location.search);

const status = params.get("status");
const username = params.get("username");
const email = params.get("email");

if (status === "success" && username) {
    const userData = {
        username,
        email
    };

    localStorage.setItem("wmail_user", JSON.stringify(userData));

    document.getElementById("userText").innerText =
        `Hoşgeldin, ${username} 😎`;

    // URL temizle
    window.history.replaceState({}, document.title, window.location.pathname);
} else {
    const saved = localStorage.getItem("wmail_user");

    if (saved) {
        const user = JSON.parse(saved);
        document.getElementById("userText").innerText =
            `Hoşgeldin tekrar, ${user.username} 🔥`;
    }
}
</script>

</body>
</html>
